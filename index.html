<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request a Hug</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F97316;
      --yellow: #FACC15;
      --green:  #22C55E;
      --blue:   #3B82F6;
      --bg:     #FDFAF5;
      --text:   #1C1917;
      --muted:  #78716C;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── floating blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 420px; height: 420px; background: var(--orange); top: -120px; left: -100px; }
    .blob-2 { width: 320px; height: 320px; background: var(--yellow); bottom: -80px; right: -60px; }
    .blob-3 { width: 260px; height: 260px; background: var(--green); bottom: 60px; left: -40px; }
    .blob-4 { width: 200px; height: 200px; background: var(--blue); top: 40px; right: 40px; }

    /* ── main card ── */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 32px;
      padding: 3rem 2.5rem 2.5rem;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 48px rgba(0,0,0,0.08);
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2.4rem;
      line-height: 1.5;
    }

    /* ── button ── */
    .btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .hug-btn {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: conic-gradient(
        var(--orange) 0deg 90deg,
        var(--yellow) 90deg 180deg,
        var(--green)  180deg 270deg,
        var(--blue)   270deg 360deg
      );
      padding: 0;
      transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s ease;
      box-shadow: 0 6px 28px rgba(0,0,0,0.14);
    }

    .hug-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        var(--orange) 0deg 90deg,
        var(--yellow) 90deg 180deg,
        var(--green)  180deg 270deg,
        var(--blue)   270deg 360deg
      );
      filter: blur(12px);
      opacity: 0;
      transition: opacity 0.2s;
      z-index: -1;
    }

    .hug-btn:hover { transform: scale(1.08); }
    .hug-btn:hover::before { opacity: 0.6; }
    .hug-btn:active { transform: scale(0.95); }

    .hug-btn-face {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
    }

    .hug-btn:active .hug-btn-face { transform: scale(0.9); }

    /* ── ripple ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      width: 160px;
      height: 160px;
      border: 2px solid rgba(250,204,21,0.6);
      animation: ripple-out 0.7s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-out {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    /* ── toast ── */
    .toast-wrap {
      min-height: 60px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 1px solid #E7E5E4;
      border-radius: 14px;
      padding: 10px 16px;
      font-size: 13.5px;
      color: var(--text);
      width: 100%;
      max-width: 320px;
      animation: toast-in 0.35s cubic-bezier(.34,1.56,.64,1) forwards;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .toast.error { border-color: #FECACA; background: #FFF5F5; }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .toast-icon { font-size: 18px; flex-shrink: 0; }
    .toast-body { display: flex; flex-direction: column; gap: 1px; }
    .toast-title { font-weight: 500; }
    .toast-meta  { font-size: 12px; color: var(--muted); }

    /* ── counter ── */
    .counter {
      font-size: 12px;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .counter span {
      font-weight: 500;
      color: var(--text);
    }

    /* ── setup banner ── */
    .setup-banner {
      margin-top: 1.5rem;
      background: #FFF7ED;
      border: 1px solid #FED7AA;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12.5px;
      color: #92400E;
      text-align: left;
      line-height: 1.5;
    }
    .setup-banner strong { display: block; margin-bottom: 4px; font-size: 13px; }
    .setup-banner code {
      background: rgba(0,0,0,0.06);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <div class="card">
    <p class="eyebrow">you deserve it</p>
    <h1>Request a Hug</h1>
    <p class="subtitle">Press the button and an email alert<br>will be sent straight to your inbox.</p>

    <div class="btn-wrap">
      <div style="position:relative; display:flex; align-items:center; justify-content:center;">
        <button class="hug-btn" id="hugBtn" onclick="sendHug(this)">
          <div class="hug-btn-face">🤗</div>
        </button>
      </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>
    <p class="counter" id="counter" style="display:none">
      Hugs requested today: <span id="hugCount">0</span>
    </p>

    <!-- ⚠️ Remove this banner once you've added your EmailJS keys below -->

  <script>
    /* ============================================================
       EMAILJS CONFIGURATION
       1. Sign up free at https://www.emailjs.com
       2. Create a Service (Gmail, Outlook, etc.)
       3. Create an Email Template — use these variables in it:
            {{to_email}}   — recipient address
            {{hug_count}}  — how many hugs sent
            {{sent_at}}    — timestamp
       4. Replace the three values below
    ============================================================ */
    const EMAILJS_PUBLIC_KEY  = 'J3EBCp9h4gYpF5t8H';   // Account > API Keys
    const EMAILJS_SERVICE_ID  = 'service_e93z8ou';   // Email Services
    const EMAILJS_TEMPLATE_ID = 'template_zln99dl';  // Email Templates

    // ── Your email address ──
    const YOUR_EMAIL = 'your@email.com';

    // ── initialise EmailJS ──
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    let hugCount = 0;

    async function sendHug(btn) {
      // ripple
      const wrap = btn.parentElement;
      const r = document.createElement('div');
      r.className = 'ripple';
      wrap.appendChild(r);
      r.addEventListener('animationend', () => r.remove());

      btn.disabled = true;

      hugCount++;
      const now = new Date();
      const sentAt = now.toLocaleString();

      // show counter
      const counterEl = document.getElementById('counter');
      document.getElementById('hugCount').textContent = hugCount;
      counterEl.style.display = 'block';

      // hide setup banner once button is pressed
      document.getElementById('setupBanner').style.display = 'none';

      // guard: show warning if keys not set
      if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
        showToast('warning', '⚠️', 'Keys not configured', 'Replace the placeholder values in index.html');
        btn.disabled = false;
        return;
      }

      showToast('loading', '📨', 'Sending alert…', 'Reaching your inbox');

      try {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_email:  YOUR_EMAIL,
          hug_count: hugCount,
          sent_at:   sentAt,
        });

        clearToasts();
        showToast('success', '✅', 'Hug alert sent!', `Delivered at ${now.toLocaleTimeString()}`);
      } catch (err) {
        clearToasts();
        showToast('error', '❌', 'Send failed', err.text || 'Check your EmailJS config');
        hugCount--; // rollback
        document.getElementById('hugCount').textContent = hugCount;
      }

      btn.disabled = false;
    }

    function showToast(type, icon, title, meta) {
      const wrap = document.getElementById('toastWrap');
      const t = document.createElement('div');
      t.className = 'toast' + (type === 'error' ? ' error' : '');
      t.innerHTML = `
        <span class="toast-icon">${icon}</span>
        <div class="toast-body">
          <span class="toast-title">${title}</span>
          <span class="toast-meta">${meta}</span>
        </div>`;
      wrap.appendChild(t);
      if (type === 'success') setTimeout(() => t.remove(), 4000);
    }

    function clearToasts() {
      document.getElementById('toastWrap').innerHTML = '';
    }
  </script>
</body>
</html>
